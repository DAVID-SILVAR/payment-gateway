  spring:
    application:
      name: payment-gateway

    datasource:
      url: jdbc:mysql://localhost:3306/payment_gateway?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: root
      password:
      driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true
      database-platform: org.hibernate.dialect.MySQL8Dialect

  jwt:
    secret: 8f2e4d6a1b9c3f5e7d8a0c2b4e6f9d1a3c5e7f9b2d4a6c8e0f1b3d5a7c9e2f4
    expiration: 86400000
    refresh-expiration: 604800000